<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator with History</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div class="calculator">
            <div class="display">
                <div id="previous-operand" class="previous-operand"></div>
                <div id="current-operand" class="current-operand">0</div>
            </div>
            
            <div class="buttons">
                <button class="btn accent clear" data-action="clear">AC</button>
                <button class="btn accent" data-action="delete">DEL</button>
                <button class="btn operator" data-operator="/">÷</button>
                
                <button class="btn" data-number="7">7</button>
                <button class="btn" data-number="8">8</button>
                <button class="btn" data-number="9">9</button>
                <button class="btn operator" data-operator="*">×</button>
                
                <button class="btn" data-number="4">4</button>
                <button class="btn" data-number="5">5</button>
                <button class="btn" data-number="6">6</button>
                <button class="btn operator" data-operator="-">−</button>
                
                <button class="btn" data-number="1">1</button>
                <button class="btn" data-number="2">2</button>
                <button class="btn" data-number="3">3</button>
                <button class="btn operator" data-operator="+">+</button>
                
                <button class="btn zero" data-number="0">0</button>
                <button class="btn" data-number=".">.</button>
                <button class="btn equal" data-action="equals">=</button>
            </div>
        </div>

        <div class="history-panel">
            <div class="history-header">
                <h3>Calculation History</h3>
                <button id="clear-history-btn" class="clear-history-btn">Clear Log</button>
            </div>
            <div id="history-log" class="history-log">
                <p class="empty-history-msg">No logs logged yet.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
